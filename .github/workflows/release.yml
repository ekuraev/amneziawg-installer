name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: a tag must clear the full pre-tag checklist before anything is
  # published. A fresh install verifies the helper-script SHA pins over the
  # network, so a tag with stale pins would yield a broken install straight
  # from the release. This job blocks that.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so the merge-base for the diff checks is present.
          fetch-depth: 0

      - name: Fetch main for diff base
        # The tag checkout does not bring branch refs. preflight-check.sh diffs
        # against origin/main, so make that ref resolvable. A hard failure here
        # is intentional: without a base ref the punctuation/marker diff checks
        # cannot run.
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Install shellcheck and bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Run preflight checks
        env:
          BASE_REF: origin/main
        run: bash scripts/preflight-check.sh

  release:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists - skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists != 'true'
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ESCAPED="${VERSION//./\\.}"

          if ! grep -q "^## \\[${ESCAPED}\\]" CHANGELOG.en.md; then
            echo "::error::Version ${VERSION} not found in CHANGELOG.en.md"
            exit 1
          fi

          # Extract: from version header to next version header or end of file
          awk "/^## \\[${ESCAPED}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.en.md > /tmp/release-notes.md

          echo "--- Release notes preview ---"
          cat /tmp/release-notes.md

      - name: Create Release
        if: steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
