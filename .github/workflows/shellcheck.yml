name: ShellCheck

# Без paths-фильтра намеренно: 'Lint and syntax check' - обязательный статус в
# branch-protection main. С paths-фильтром docs-only PR не запускал этот workflow,
# обязательный чек висел 'expected', и PR блокировался (mergeStateStatus=BLOCKED).
# Линт прогоняет все .sh через git ls-files и на docs-only диффе тривиально зелёный.
# workflow_dispatch - чтобы прогнать на форке перед merge (правило проекта для CI-правок).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Lint and syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Show ShellCheck version
        run: shellcheck --version

      - name: Run ShellCheck and syntax check
        run: |
          # pathspec '*.sh' в git ls-files матчится рекурсивно (включая scripts/)
          mapfile -t scripts < <(git ls-files '*.sh')
          mapfile -t test_helpers < <(git ls-files 'tests/*.bash')
          mapfile -t test_bats < <(git ls-files 'tests/*.bats')

          # bash -n only on .sh and .bash (bats syntax is not valid bash)
          for f in "${scripts[@]}" "${test_helpers[@]}"; do
            echo "--- bash -n $f ---"
            bash -n "$f"
          done

          # shellcheck on all shell files including .bats
          all=("${scripts[@]}" "${test_helpers[@]}" "${test_bats[@]}")
          for f in "${all[@]}"; do
            echo "--- shellcheck $f ---"
            shellcheck -x -s bash -S warning "$f"
          done
